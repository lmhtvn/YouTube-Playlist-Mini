<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listen Mini</title>
  <meta name="description" content="Nghe nhạc YouTube với session playlist lưu trên Cloudflare KV." />
  <link rel="icon" href="./favicon.ico" sizes="any">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <main class="app">
      <section class="card">
        <div class="topbar">
          <div class="brand">
            <div class="brand-dot"></div>
            <span>Listen Mini</span>
          </div>
        </div>

        <div class="session-create">
          <input
            id="sessionSlugInput"
            type="text"
            placeholder="Tạo session mới, ví dụ: chill-night"
            autocomplete="off"
          />
          <button id="createSessionBtn" class="btn btn-primary" type="button">Tạo</button>
        </div>

        <div class="session-open">
          <input
            id="openSessionInput"
            type="text"
            placeholder="Nhập session slug để mở..."
            autocomplete="off"
          />
          <button id="openSessionBtn" class="btn btn-secondary" type="button">Mở</button>
        </div>

        <p id="message" class="message"></p>

        <div class="meta-box">
          <p class="meta-kicker">Session hiện tại</p>
          <h2 id="sessionName">Chưa có session</h2>
          <p id="sessionSlug" class="meta-sub">Tạo mới hoặc mở bằng ?s=session-slug</p>
        </div>

        <div class="session-tools">
          <button id="renameSessionBtn" class="btn btn-secondary" type="button">Đổi tên</button>
          <button id="copyLinkBtn" class="btn btn-secondary" type="button">Copy link</button>
          <button id="deleteSessionBtn" class="btn btn-danger" type="button">Xoá session</button>
        </div>
      </section>

      <section class="card">
        <div class="add-song">
          <input
            id="youtubeUrl"
            type="text"
            placeholder="Dán link YouTube hoặc video ID..."
            autocomplete="off"
          />
          <button id="addBtn" class="btn btn-primary" type="button">Thêm</button>
        </div>

        <div class="player-frame">
          <div id="player"></div>

          <div id="playerPlaceholder" class="player-placeholder">
            <div class="placeholder-inner">
              <div class="placeholder-disc">▶</div>
              <h3>Chưa có bài nào</h3>
              <p>Thêm bài vào session để bắt đầu</p>
            </div>
          </div>
        </div>

        <div class="now-playing">
          <p class="meta-kicker">Đang phát</p>
          <h2 id="nowPlayingTitle">Chưa có bài nào</h2>
          <p id="nowPlayingMeta" class="meta-sub">Thông tin bài sẽ hiện ở đây</p>

          <div class="controls">
            <button id="prevBtn" class="btn btn-secondary" type="button">⏮</button>
            <button id="playPauseBtn" class="btn btn-primary" type="button">⏯</button>
            <button id="nextBtn" class="btn btn-secondary" type="button">⏭</button>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <div>
            <p class="meta-kicker">Danh sách bài</p>
            <h2 id="songCount">0 bài</h2>
          </div>
        </div>

        <div id="songList" class="song-list">
          <div class="empty-box">
            Chưa có session nào đang mở.<br />
            Hãy tạo session mới hoặc nhập slug để mở.
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="./app.js"></script>
</body>
</html>
